<div class="container">
  <div class="register-container">
    <div class="text-center mb-4">
      <h2 class="fw-bold">Login</h2>
      <p class="text-muted">Continue to Gongren High?</p>
    </div>
    <div class="pfp">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png" alt="Profile" class="img-fluid rounded-circle" width="120">
    </div>

    <br><br><br>

    <form id="regForm">
      <div class="mb-4">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Will" required>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="********" required>
      </div>

      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" id="terms" required onchange="checkAgreement()">
        <label class="form-check-label" for="terms">
          I agree to the Terms and Conditions and Privacy Policy
        </label>
      </div>

      <p id="termsMessage" class="mt-2"></p>
      <p id="loginMessage" class="mt-2 text-danger"></p>

      <button id="loginBtn" type="submit" class="btn btn-black">Login</button>
    </form>
  </div>
</div>

<script>
let attempt_counter = 0;

document.getElementById("regForm").onsubmit = function(event) {
  event.preventDefault();

  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  if (username === "vanilux" && password === "ice_cream") {
    document.getElementById("loginMessage").innerHTML = "✔ Login successful!";
    attempt_counter = 0; // reset
    window.location.href = "notebooks.html"; // go to second page
  } else {
    attempt_counter++;
    document.getElementById("loginMessage").innerHTML =
      "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";

    if (attempt_counter >= 3) {
      document.getElementById("loginMessage").innerHTML =
        "Too many failed attempts. Login disabled.";
      document.getElementById("loginBtn").disabled = true;
    }
  }
};

function checkAgreement() {
  let agreed = document.getElementById("terms").checked;
  if (agreed) {
    document.getElementById("termsMessage").innerHTML = "✔ You accepted the terms.";
  } else {
    document.getElementById("termsMessage").innerHTML =
      "You must accept the terms to continue.";
  }
}
</script>
